<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pancreas-App</title>

    <base href="/Pancreas-App/" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <link href="Pancreas-App.styles.css" rel="stylesheet" />

    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.66stpp682q.js"></script>

    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
    </script>

    <script src="js/indexedDb.js"></script>

    <script>
        // Manejador de actualización de PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data?.type === 'NEW_VERSION_AVAILABLE') {
                    window.dispatchEvent(new Event('pwa-update-available'));
                }
            });
        }

        window.registerPwaUpdateHandler = () => {
            window.addEventListener('pwa-update-available', () => {
                if (typeof bootstrap !== 'undefined') {
                    var modalElement = document.getElementById('updateModal');
                    if (modalElement) {
                        var modal = new bootstrap.Modal(modalElement);
                        modal.show();
                    }
                }
            });
        };
    </script>
</body>

</html>
